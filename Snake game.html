
 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game </title>
 <link rel="stylesheet" href="snake.css">
</head>
<body>

<h1>Snake</h1>
<div id="score">Score: 0</div>

<div class="game-container">
  <canvas id="gameCanvas" width="400" height="400"></canvas>
</div>

<div class="controls-hint">
  Use arrow keys or WASD to move<br>
  Press SPACE or click to restart after game over
</div>

<button onclick="resetGame()">New Game</button>

<script>
// ==================== SNAKE GAME ====================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');

const GRID_SIZE = 20;
const TILE_COUNT = canvas.width / GRID_SIZE;

let snake = [{x: 10, y: 10}];
let food = {x: 15, y: 15};
let dx = 1;
let dy = 0;
let score = 0;
let gameOver = false;
let gameSpeed = 100; // ms per frame
let gameLoop;

function draw() {
  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Snake
  snake.forEach((segment, i) => {
    // Head is brighter
    ctx.fillStyle = i === 0 ? '#4ade80' : '#2e7d32';
    ctx.fillRect(
      segment.x * GRID_SIZE,
      segment.y * GRID_SIZE,
      GRID_SIZE - 1,
      GRID_SIZE - 1
    );

    // Nice glow on head
    if (i === 0) {
      ctx.shadowColor = '#4ade80';
      ctx.shadowBlur = 10;
      ctx.fillRect(
        segment.x * GRID_SIZE,
        segment.y * GRID_SIZE,
        GRID_SIZE - 1,
        GRID_SIZE - 1
      );
      ctx.shadowBlur = 0;
    }
  });

  // Food
  ctx.fillStyle = '#ff5252';
  ctx.beginPath();
  ctx.arc(
    food.x * GRID_SIZE + GRID_SIZE/2,
    food.y * GRID_SIZE + GRID_SIZE/2,
    GRID_SIZE/2 - 3,
    0,
    Math.PI * 2
  );
  ctx.fill();

  // Eyes on food :P
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(food.x * GRID_SIZE + GRID_SIZE*0.35, food.y * GRID_SIZE + GRID_SIZE*0.35, 3, 0, Math.PI*2);
  ctx.arc(food.x * GRID_SIZE + GRID_SIZE*0.65, food.y * GRID_SIZE + GRID_SIZE*0.35, 3, 0, Math.PI*2);
  ctx.fill();
}

function update() {
  if (gameOver) return;

  // Create new head position
  const head = {x: snake[0].x + dx, y: snake[0].y + dy};

  // Wall collision
  if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
    endGame();
    return;
  }

  // Self collision
  for (let segment of snake) {
    if (head.x === segment.x && head.y === segment.y) {
      endGame();
      return;
    }
  }

  // Add new head
  snake.unshift(head);

  // Eat food?
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreElement.textContent = `Score: ${score}`;

    // Increase speed slightly every 5 foods
    if (score % 50 === 0 && gameSpeed > 50) {
      gameSpeed -= 8;
      clearInterval(gameLoop);
      gameLoop = setInterval(game, gameSpeed);
    }

    placeNewFood();
  } else {
    // Remove tail
    snake.pop();
  }

  draw();
}

function placeNewFood() {
  food.x = Math.floor(Math.random() * TILE_COUNT);
  food.y = Math.floor(Math.random() * TILE_COUNT);

  // Make sure food doesn't spawn on snake
  for (let segment of snake) {
    if (food.x === segment.x && food.y === segment.y) {
      placeNewFood();
      return;
    }
  }
}

function changeDirection(e) {
  if (gameOver) return;

  const key = e.key.toLowerCase();

  if ((key === 'arrowup' || key === 'w') && dy === 0) {
    dx = 0; dy = -1;
  }
  else if ((key === 'arrowdown' || key === 's') && dy === 0) {
    dx = 0; dy = 1;
  }
  else if ((key === 'arrowleft' || key === 'a') && dx === 0) {
    dx = -1; dy = 0;
  }
  else if ((key === 'arrowright' || key === 'd') && dx === 0) {
    dx = 1; dy = 0;
  }
}

function endGame() {
  gameOver = true;
  clearInterval(gameLoop);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#ff5252';
  ctx.font = 'bold 40px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);

  ctx.font = '24px Arial';
  ctx.fillStyle = '#eee';
  ctx.fillText(`Score: ${score}`, canvas.width/2, canvas.height/2 + 20);
}

function resetGame() {
  snake = [{x: 10, y: 10}];
  food = {x: 15, y: 15};
  dx = 1;
  dy = 0;
  score = 0;
  gameOver = false;
  gameSpeed = 100;
  scoreElement.textContent = 'Score: 0';
  clearInterval(gameLoop);
  gameLoop = setInterval(game, gameSpeed);
  draw();
}

function game() {
  update();
}

// Controls
window.addEventListener('keydown', changeDirection);

// Also allow restart with space
window.addEventListener('keydown', e => {
  if (gameOver && e.code === 'Space') {
    resetGame();
  }
});

// Start game
resetGame();

</script>
</body>
</html>
    
</body>
</html>
